---
# Service configuration
nginx_proxy_service_enabled: true
nginx_proxy_service_state: started
nginx_proxy_service_user: nginx

# Worker settings
nginx_proxy_workers_processes: auto
nginx_proxy_workers_connections: 1024

# Global SSL/TLS settings
nginx_proxy_ssl_protocols: TLSv1.2 TLSv1.3
nginx_proxy_ssl_ciphers: HIGH:!aNULL:!MD5
nginx_proxy_ssl_prefer_server_ciphers: true
nginx_proxy_ssl_session_cache: shared:SSL:10m
nginx_proxy_ssl_session_timeout: 10m

# SSL certificates registry
nginx_proxy_ssl_dest_dir: /etc/nginx/ssl
nginx_proxy_ssl_certificates: []
# Example:
# nginx_proxy_ssl_certificates:
#   - internal
#   - public
# Global limits
nginx_proxy_client_max_body_size: 10M

# Proxy timeouts
nginx_proxy_proxy_connect_timeout: 60s
nginx_proxy_proxy_send_timeout: 60s
nginx_proxy_proxy_read_timeout: 60s

# Proxy buffers
nginx_proxy_proxy_buffer_size: 4k
nginx_proxy_proxy_buffers_count: 8
nginx_proxy_proxy_buffers_size: 4k
nginx_proxy_proxy_busy_buffers_size: 8k

# Logging
nginx_proxy_access_log_format: combined
nginx_proxy_error_log_level: warn

# Behavior flags
nginx_proxy_remove_default_site: true

# Per-site defaults
nginx_proxy_site_defaults:
  ssl_enabled: false
  ssl_certificate: ""  # Reference to nginx_proxy_ssl_certificates key
  ssl_cert: ""  # Or direct path
  ssl_key: ""  # Or direct path
  hsts: false
  client_max_body_size: "{{ nginx_proxy_client_max_body_size }}"
  upstream_keepalive: 0

# Site configurations (override in host_vars)
nginx_proxy_sites: []
