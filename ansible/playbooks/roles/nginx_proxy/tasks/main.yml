---
- name: Update apk cache
  community.general.apk:
    update_cache: true
  tags: install

- name: Install nginx
  community.general.apk:
    name: nginx
    state: present
  tags: install

- name: Create nginx service user
  ansible.builtin.user:
    name: &nginx_user "{{ nginx_proxy_service_user }}"
    shell: /sbin/nologin
  tags: configure

- name: Ensure nginx directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: *nginx_user
    group: *nginx_user
    mode: "0755"
  loop:
    - /etc/nginx/http.d
    - /var/log/nginx
  tags: configure

- name: Configure SSL
  when: nginx_proxy_ssl_certificates | length > 0
  tags: configure
  block:
    - name: Create SSL certificates directory
      ansible.builtin.file:
        path: "{{ nginx_proxy_ssl_dest_dir }}"
        state: directory
        owner: *nginx_user
        group: *nginx_user
        mode: "0750"

    - name: Deploy TLS certificates
      ansible.builtin.include_tasks:
        file: deploy_tls_certificate.yml
        apply:
          tags: configure
      loop: "{{ nginx_proxy_ssl_certificates }}"

- name: Deploy nginx main configuration
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
    owner: *nginx_user
    group: *nginx_user
    mode: "0644"
    validate: "nginx -t -c %s"
  notify: reload nginx
  tags: configure

- name: Deploy reverse proxy configurations
  ansible.builtin.template:
    src: proxy.conf.j2
    dest: "/etc/nginx/http.d/{{ item.name }}.conf"
    owner: *nginx_user
    group: *nginx_user
    mode: "0644"
    validate: "nginx -t -c %s"
  loop: "{{ nginx_proxy_sites }}"
  loop_control:
    label: "{{ item.name }}"
  notify: reload nginx
  tags: configure

- name: Remove default nginx site
  ansible.builtin.file:
    path: /etc/nginx/http.d/default.conf
    state: absent
  when: nginx_proxy_remove_default_site
  notify: reload nginx
  tags: configure

- name: Enable and start nginx service
  ansible.builtin.service:
    name: nginx
    enabled: "{{ nginx_proxy_service_enabled }}"
    state: "{{ nginx_proxy_service_state }}"
  tags: service
