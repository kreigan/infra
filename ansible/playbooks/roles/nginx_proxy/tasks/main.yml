---
- name: Include platform-specific deployment tasks
  ansible.builtin.include_tasks:
    file: "deploy/{{ ansible_os_family | lower }}.yml"
  tags: always

- name: Configure SSL
  when: nginx_proxy_ssl_certificates | length > 0
  tags: configure
  block:
    - name: Create SSL certificates directory
      ansible.builtin.file:
        path: "{{ nginx_proxy_ssl_dest_dir }}"
        state: directory
        owner: "{{ nginx_proxy_service_user }}"
        group: "{{ nginx_proxy_service_user }}"
        mode: "0750"

    - name: Deploy TLS certificates
      ansible.builtin.include_tasks:
        file: deploy_tls_certificate.yml
        apply:
          tags: configure
      loop: "{{ nginx_proxy_ssl_certificates }}"

- name: Deploy nginx main configuration
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
    owner: "{{ nginx_proxy_service_user }}"
    group: "{{ nginx_proxy_service_user }}"
    mode: "0644"
    validate: "nginx -t -c %s"
  notify: reload nginx
  tags: configure

- name: Deploy reverse proxy configurations
  ansible.builtin.template:
    src: proxy.conf.j2
    dest: "{{ nginx_config_dir }}/{{ item.name }}.conf"
    owner: "{{ nginx_proxy_service_user }}"
    group: "{{ nginx_proxy_service_user }}"
    mode: "0644"
    validate: "nginx -t -c %s"
  loop: "{{ nginx_proxy_sites }}"
  loop_control:
    label: "{{ item.name }}"
  notify: reload nginx
  tags: configure

- name: Enable sites (Debian)
  ansible.builtin.file:
    src: "{{ nginx_config_dir }}/{{ item.name }}.conf"
    dest: "{{ nginx_sites_enabled_dir }}/{{ item.name }}.conf"
    state: link
  loop: "{{ nginx_proxy_sites }}"
  loop_control:
    label: "{{ item.name }}"
  when: nginx_sites_enabled_dir is defined
  notify: reload nginx
  tags: configure

- name: Remove default nginx site
  ansible.builtin.file:
    path: "{{ nginx_default_site }}"
    state: absent
  when: nginx_proxy_remove_default_site
  notify: reload nginx
  tags: configure

- name: Enable and start nginx service
  ansible.builtin.service:
    name: nginx
    enabled: "{{ nginx_proxy_service_enabled }}"
    state: "{{ nginx_proxy_service_state }}"
  tags: service
