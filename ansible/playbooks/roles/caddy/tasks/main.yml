---
- name: Check if Caddy is already installed
  ansible.builtin.command: "{{ caddy_bin_dir }}/caddy version"
  register: caddy_version_check
  failed_when: false
  changed_when: false
  tags: deploy

- name: Build Caddy with xcaddy
  tags: deploy
  when: >-
    caddy_version_check.rc != 0
    or (caddy_version is defined and caddy_version not in caddy_version_check.stdout)
    or (FORCE is defined and FORCE | bool)
  block:
    - name: Make sure build dependencies are installed
      ansible.builtin.command: which go xcaddy
      delegate_to: localhost
      register: caddy_go_check
      failed_when: caddy_go_check.rc != 0
      changed_when: false

    - name: Build Caddy binary
      ansible.builtin.command:
        cmd: >-
          xcaddy build {{ caddy_version }}
          --with github.com/caddy-dns/cloudflare
          {% for module in caddy_modules %}
          --with {{ module }}
          {% endfor %}
          --output /tmp/caddy
      environment:
        GOOS: linux
        GOARCH: amd64
      delegate_to: localhost
      run_once: true
      register: caddy_build_result
      changed_when: "'Build complete' in caddy_build_result.stdout"

    - name: Verify Caddy binary
      ansible.builtin.command: test -f /tmp/caddy
      delegate_to: localhost
      run_once: true
      register: caddy_verify_result
      failed_when: caddy_verify_result.rc != 0
      changed_when: false

    - name: Deploy Caddy binary to remote
      ansible.builtin.copy:
        src: /tmp/caddy
        dest: "{{ caddy_bin_dir }}/caddy"
        mode: '0755'
        owner: root
        group: root
      become: true
      when: caddy_build_result is not skipped
      notify:
        - Reload systemd
        - Restart Caddy

    - name: Remove temporary Caddy binary
      ansible.builtin.file:
        path: /tmp/caddy
        state: absent
      delegate_to: localhost
      run_once: true
      when: caddy_build_result is not skipped

- name: Create Caddy system user
  ansible.builtin.user:
    name: "{{ caddy_user }}"
    system: true
    shell: /usr/sbin/nologin
    home: /var/lib/caddy
  become: true
  tags: deploy

- name: Create Caddy directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ caddy_user }}"
    group: "{{ caddy_group }}"
    mode: '0755'
  loop:
    - "{{ caddy_config_dir }}"
    - /var/lib/caddy
  become: true
  tags: deploy

- name: Create systemd service unit
  ansible.builtin.template:
    src: caddy.service.j2
    dest: /etc/systemd/system/caddy.service
    mode: '0644'
  become: true
  notify: Reload systemd
  tags: deploy

- name: Restart caddy if it was deployed
  ansible.builtin.meta: flush_handlers
  when:
    - caddy_build_result is defined
    - caddy_build_result is not skipped
  tags: [deploy, config]

- name: Configure Caddy
  become: true
  tags: config
  block:
    - name: Validate caddy_config is not empty
      ansible.builtin.assert:
        that:
          - caddy_config is defined
          - caddy_config | length > 0
        fail_msg: "caddy_config must be defined in host_vars and contain at least one app configuration"
        quiet: true

    - name: Create systemd drop-in directory
      ansible.builtin.file:
        path: /etc/systemd/system/caddy.service.d
        state: directory
        mode: '0755'

    - name: Create Caddy environment file for credentials
      ansible.builtin.copy:
        content: |
          # Caddy environment variables
          # Sourced by systemd service
          CF_API_TOKEN={{ caddy_cf_api_token }}
        dest: /etc/caddy/caddy.env
        owner: root
        group: root
        mode: '0600'
      no_log: true
      when: caddy_cf_api_token is defined

    - name: Render Caddy JSON config
      ansible.builtin.copy:
        content: "{{ caddy_config | to_nice_json(indent=2, sort_keys=false) }}"
        dest: "{{ caddy_config_file }}"
        mode: '0644'
        validate: "{{ caddy_bin_dir }}/caddy validate --config %s"
      environment:
        # need some 35+ symbols token to pass validation
        CF_API_TOKEN: 1234567890abcdef1234567890abcdef123
      notify: Reload Caddy

    - name: Start and enable Caddy service
      ansible.builtin.systemd:
        name: caddy
        state: started
        enabled: true
        daemon_reload: true
