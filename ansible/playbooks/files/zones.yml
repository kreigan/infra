gw_ext: &gw_ext { type: CNAME, records: [home-gw01.kreigan.com.] }
gw_int: &gw_int { type: CNAME, records: [home-gw01.int.kreigan.com.] }

zones:
  kreigan.com:
    nameservers:
      - ns.kreigan.com.

    rrsets:
      - { name: '@', type: A, records: [{ content: 192.168.21.10, comment: send to home-gw01 }] }
      - { name: ns, type: A, records: [192.168.21.5] }

      # Hosts
      - { name: home-gw01, type: A, records: [192.168.21.10] }
      - { name: home-nas01, type: A, records: [{ content: 192.168.21.250, comment: "Asustor AS5402T s/n AS25025404TM02A0" }] }
      - { name: home-pihole, type: A, records: [{ content: 192.168.21.5, comment: LXC 1007 home-pihole }] }
      - { name: ocks, type: A, records: [40.233.127.116] }
      - { name: router, type: A, records: [{ content: 192.168.21.1 }] }

      - {name: mc-cozy-vanilla, <<: *gw_ext }

      # WebUI routes
      - { name: adblock, <<: *gw_ext }
      - { name: nas01ui, <<: *gw_ext }

      # Application routes
      - { name: flux-webhook, <<: *gw_ext }
      - { name: kromgo, <<: *gw_ext }
      - { name: photos, <<: *gw_ext }
      - { name: plex, <<: *gw_ext }
      - { name: qbt, <<: *gw_ext }

  int.kreigan.com:
    nameservers:
      - ns.int.kreigan.com.

    rrsets:
      - { name: '@', type: A, records: [{ content: 10.1.21.10, comment: send to home-gw01 }] }
      - { name: ns, type: A, records: [10.1.21.3] }

      # Hosts
      - { name: home-docker01, type: A, records: [{ content: 10.1.21.30, comment: LXC 1030 home-docker01 }] }
      - { name: home-gw01, type: A, records: [{ content: 10.1.21.10, comment: Gateway Caddy server }] }
      - { name: home-ns01, type: A, records: [{ content: 10.1.21.3, comment: LXC 1004 home-ns01 (PowerDNS auth) }] }
      - { name: home-pihole, type: A, records: [{ content: 10.1.21.5, comment: LXC 1007 home-pihole }] }
      - { name: home-proxmox01, type: A, records: [{ content: 10.1.21.1, comment: "node: proxmox" }] }
      - { name: home-res01, type: A, records: [{ content: 10.1.21.2, comment: LXC 1003 home-res01 (Unbound resolver) }] }

      - { name: nfs, type: CNAME, records: [home-nas01.kreigan.com.] }

      # home-cluster: Talos cluster endpoint
      - { name: homeks, type: A, records: [{ content: 10.1.21.40, comment: "Talos: ruby" }] }

      # WebUI routes
      - { name: pdns-admin, <<: *gw_int }
      - { name: portainer, <<: *gw_int }
      - { name: pve, <<: *gw_int }

      # Application routes
      - { name: qbt, <<: *gw_int }
