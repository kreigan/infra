---
- name: Validate configuration
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Check mandatory variables
      ansible.builtin.assert:
        that:
          - ssl_dir is defined
      tags:
        - proxy
        - sites
        - ssl
        - validate

    - name: Prepare SSL certificate files
      tags:
        - proxy
        - sites
        - ssl
        - validate
      block:
        - name: Find certificate files
          ansible.builtin.find:
            paths: "{{ ssl_dir }}"
            file_type: any
            patterns: "cert.pem,privkey.pem"
            recurse: true
            follow: true
          register: ssl_files_raw

        - name: Initialize certificate map
          ansible.builtin.set_fact:
            ssl_files: {}

        - name: Build certificate map by subfolder
          ansible.builtin.set_fact:
            ssl_files: >-
              {{
                ssl_files | combine({
                  item.path | dirname | basename: (
                    ssl_files[item.path | dirname | basename] | default([])
                  ) + [item.path]
                })
              }}
          loop: "{{ ssl_files_raw.files }}"
          loop_control:
            label: "{{ item.path | dirname | basename }}"

        - name: Ensure even number of certificate files per site
          ansible.builtin.assert:
            that:
              - ssl_files[item.key] | length % 2 == 0
            fail_msg: "Site {{ item.key }} has an odd number of certificate files (found {{ ssl_files[item.key] | length }})"
            success_msg: "Site {{ item.key }} has an even number of certificate files"
          loop: "{{ ssl_files | dict2items }}"
          loop_control:
            label: "{{ item.key }}"

        - name: Share certificate map with other plays
          ansible.builtin.set_fact:
            ssl_files: "{{ ssl_files }}"
            cacheable: true

- name: Configure nginx reverse proxy
  hosts: proxies
  become: true

  roles:
    - role: cloudflared
      when: cloudflared
      tags: cloudflared
    - role: nginx_proxy
      vars:
        nginx_proxy_cert_files: "{{ hostvars['localhost']['ssl_files'] }}"
      tags: proxy
