---

all:
  vars:
    ansible_user: ansible
    ansible_python_interpreter: /usr/bin/python3

# ON PREM

onprem:
  hosts:
    proxmox01:
      ansible_host: "10.1.21.1"
    resolver01:
      ansible_host: "10.1.21.2"
    pdnsdb01:
      ansible_host: "10.1.21.6"
    ns01:
      ansible_host: "10.1.21.3"
      pdnsdb_ip: "{{ hostvars['pdnsdb01']['ansible_host'] }}"
    ns02:
      ansible_host: "10.1.21.4"
      pdnsdb_ip: "{{ hostvars['pdnsdb01']['ansible_host'] }}"
    pihole01:
      ansible_host: "10.1.21.5"
    gateway01:
      ansible_host: "10.1.21.20"
    docker01:
      ansible_host: "10.1.21.30"
  vars:
    cloud: false

proxmox_nodes:
  hosts:
    proxmox01:
      proxmox_node_name: proxmox

dns:
  children:
    pihole:
      hosts:
        pihole01:
    powerdns:
      hosts:
        ns01:
        ns02:
    resolvers:
      hosts:
        resolver01:
  hosts:
    pdnsdb01:

gateways:
  hosts:
    gateway01:

docker_nodes:
  hosts:
    docker01:

# CLOUD PROVIDERS

oracle:
  hosts:
    ampere-vm:
      ansible_host: ampere-vm-cloud-services.kreigan.com
  vars:
    cloud_provider: oracle

cloud:
  children:
    oracle:
  vars:
    cloud: true
