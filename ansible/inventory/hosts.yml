---
all:
  vars:
    ansible_user: ansible
    ansible_python_interpreter: /usr/bin/python3
    internal_domain: internal.kreigan.com

# PROXMOX NODES

proxmox_nodes:
  hosts:
    prxvn01:
      ansible_host: proxmox.internal.kreigan.com
      proxmox_node_name: proxmox
  vars:
    service_type: proxmox

containers:
  hosts:
    pihole:
      ansible_host: pihole.internal.kreigan.com
      service_type: pihole
      tls_cert_path: /etc/pihole/{{ internal_domain }}.pem

home:
  children:
    proxmox_nodes:
  hosts:
    pihole:

webui:
  children:
    proxmox_nodes:
  hosts:
    pihole:
