---
caddy_version: v2.10.2

caddy_modules:
  - github.com/mholt/caddy-l4

caddy_config:
  apps:
    pki:
      certificate_authorities:
        kreigan:
          name: "Kreigan Internal CA"
          root_common_name: "Kreigan CA"
          install_trust: true
          root:
            certificate: /etc/ssl/ca/kreigan.crt
            private_key: /etc/ssl/ca/kreigan.key
    tls:
      automation:
        policies:
          - subjects:
              - "*.kreigan.com"
            issuers:
              - module: acme
                email: "webmaster@kreigan.com"
                challenges:
                  dns:
                    provider:
                      name: cloudflare
                      api_token: "{env.CF_API_TOKEN}"
          - subjects:
              - "*.int.kreigan.com"
            issuers:
              - module: internal
                ca: kreigan
                lifetime: 90d

    http:
      servers:
        srv0:
          listen: [":80", ":443"]
          routes:
            - match:
                - host: ["*.kreigan.com"]
              handle:
                - handler: subroute
                  routes: "{{ caddy_routes_public | default([]) }}"

            - match:
                - host: ["*.int.kreigan.com"]
              handle:
                - handler: subroute
                  routes: "{{ caddy_routes_internal | default([]) }}"

    layer4:
      servers:
        minecraft:
          listen: [":25565"]
          routes:
            - match: []
              handle:
                - handler: proxy
                  upstreams:
                    - dial: ["homeks-gw01.int.kreigan.com:25565"]
